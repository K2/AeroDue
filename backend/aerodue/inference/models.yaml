# On-device model profiles for Pixel 8 class hardware (Tensor G3, 8GB RAM)
# Ship ONE active profile in the APK; others for A/B or fallback.

default_profile: qwen2_5_0_5b_litertlm

profiles:
  qwen2_5_0_5b_litertlm:
    family: qwen2.5
    repo: litert-community/Qwen2.5-0.5B-Instruct
    filename: qwen2.5-0.5b-instruct.litertlm
    format: litertlm
    quantization: int4
    context_tokens: 4096
    max_tokens: 512
    ram_budget_mb: 1200
    notes: Primary on Android — LiteRT-LM via android/llm (Pixel 8 GPU/CPU)

  qwen2_5_0_5b_q4:
    family: qwen2.5
    repo: Qwen/Qwen2.5-0.5B-Instruct-GGUF
    filename: qwen2.5-0.5b-instruct-q4_k_m.gguf
    format: gguf
    quantization: q4_k_m
    context_tokens: 4096
    max_tokens: 512
    ram_budget_mb: 1200
    notes: Primary — good quality/size for regulatory summarization

  smollm2_360m_q4:
    family: smollm2
    repo: HuggingFaceTB/SmolLM2-360M-Instruct-GGUF
    filename: smollm2-360m-instruct-q4_k_m.gguf
    format: gguf
    quantization: q4_k_m
    context_tokens: 2048
    max_tokens: 384
    ram_budget_mb: 600
    notes: Fallback when thermal throttling or low memory

runtime:
  # Android: LiteRT-LM (android/llm); GGUF profiles for host eval / future JNI
  preferred_android: litert_lm
  temperature: 0.2
  top_p: 0.9

prompts:
  system: |
    You are AeroDue, an offline travel compensation assistant. Use only the
    provided regulation excerpts and user coverage facts. Never invent amounts.
    If uncertain, say what documentation is needed.
  claim_rationale: |
    Disruption: {disruption_json}
    Coverage: {coverage_json}
    Rule hits: {claims_json}
    Relevant excerpts:
    {excerpts}
    Write a concise passenger-facing explanation and checklist (max 200 words).
